<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gigi</title>
</head>
<body>
    <h1>Gigi</h1>
    <div id="chatBox" style="height:300px;overflow-y:auto;border:1px solid #ccc;padding:10px;margin-bottom:10px;"></div>
    <input type="text" id="msg" placeholder="输入消息..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">发送</button>

    <script>
        function add(text, isUser) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.style.textAlign = isUser ? 'right' : 'left';
            div.style.color = isUser ? 'blue' : 'green';
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msg');
            const msg = input.value.trim();
            if (!msg) return;

            add(msg, true);
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                add(data.response, false);
            } catch (e) {
                add('错误: ' + e.message, false);
            }
        }
    </script>
</body>
</html>
